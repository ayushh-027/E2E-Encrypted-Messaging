<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E Encrypted Chat</title>
    <link rel="stylesheet" href="style.css">
    <!-- JSEncrypt for RSA-2048 with PKCS#1 v1.5 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Screen 1: Lobby (create or join a room) -->
        <div id="screen1" class="screen">
            <div class="card">
                <h1>E2E Encrypted Chat</h1>
                <p class="subtitle">Secure WebSocket Relay</p>

                <div class="form-group">
                    <label for="wsUrl">WebSocket URL</label>
                    <!-- Changed default value for local testing -->
                    <input type="text" id="wsUrl" value="wss://e2e-encrypted-messaging-2.onrender.com" autocomplete="off">
                </div>

                <!-- Mode picker -->
                <div id="modeSelect" class="mode-select">
                    <button type="button" id="createRoomBtn">Create Room</button>
                    <button type="button" id="joinRoomBtn" class="btn-outline">Join Room</button>
                </div>

                <!-- Join-with-code form -->
                <form id="joinForm" class="hidden">
                    <div class="form-group">
                        <label for="roomCodeInput">Room Code</label>
                        <input type="text" id="roomCodeInput" class="code-input" placeholder="ABCDE" maxlength="5" autocomplete="off">
                    </div>
                    <button type="submit" id="joinSubmitBtn">Join</button>
                    <button type="button" id="joinBackBtn" class="btn-link">← Back</button>
                </form>

                <!-- Waiting / room-code display -->
                <div id="waitingPanel" class="hidden">
                    <p class="waiting-label">Share this code with your partner</p>
                    <div class="room-code-display" id="roomCodeDisplay">•••••</div>
                    <button type="button" id="copyCodeBtn" class="btn-outline">Copy Code</button>
                    <div class="waiting-row">
                        <!-- Added an ID to the spinner -->
                        <span class="spinner" id="loadingSpinner"></span>
                        <p class="waiting-status" id="waitingStatus">Creating room...</p>
                    </div>
                    <button type="button" id="cancelRoomBtn" class="btn-link">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Screen 2: Chat -->
        <div id="screen2" class="screen hidden">
            <div class="chat-header">
                <div class="header-info">
                    <h2 id="chatTargetName">Room</h2>
                    <div id="statusIndicator" class="status yellow">Connecting...</div>
                </div>
                <button id="disconnectBtn" class="btn-small" type="button">Leave</button>
            </div>
            
            <div id="messages" class="messages-container"></div>
            
            <form id="chatForm" class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="Type an encrypted message..." autocomplete="off" disabled>
                    <div id="charCounter" class="char-counter">0 / 245</div>
                </div>
                <button type="submit" id="sendBtn" disabled>
                    <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>
    
    <script src="app.js" defer></script>
</body>
</html>
